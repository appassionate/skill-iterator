<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Train</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
    code, .mono { font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace; }
  </style>
</head>
<body class="bg-white text-slate-800 min-h-screen">

  <!-- Header -->
  <header class="bg-slate-900 text-white px-6 py-4">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
      <div>
        <h1 class="text-xl font-bold" id="header-title">Train</h1>
        <p class="text-slate-400 text-sm mt-0.5" id="header-meta"></p>
      </div>
      <div class="flex gap-5 text-sm" id="header-stats"></div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-6 space-y-6">

    <!-- Friction Section -->
    <section class="border border-slate-200 rounded-lg overflow-hidden" id="section-friction">
      <div class="bg-slate-50 border-b border-slate-200 px-4 py-2.5">
        <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">Friction</span>
      </div>
      <div class="p-4" id="friction-container"></div>
    </section>

    <!-- Summary: Item Results -->
    <section class="border border-slate-200 rounded-lg overflow-hidden" id="section-results">
      <div class="bg-slate-50 border-b border-slate-200 px-4 py-2.5">
        <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">Item Results</span>
      </div>
      <div class="p-4" id="results-container"></div>
    </section>

    <!-- Summary: Scripts Created -->
    <section class="border border-slate-200 rounded-lg overflow-hidden hidden" id="section-scripts">
      <div class="bg-slate-50 border-b border-slate-200 px-4 py-2.5">
        <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">Scripts Created</span>
      </div>
      <div class="p-4" id="scripts-container"></div>
    </section>

    <!-- Summary: Notes -->
    <section class="border border-slate-200 rounded-lg overflow-hidden hidden" id="section-notes">
      <div class="bg-slate-50 border-b border-slate-200 px-4 py-2.5">
        <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">Notes</span>
      </div>
      <div class="p-4" id="notes-container"></div>
    </section>

  </main>

  <script id="train-data">
  const TRAIN_DATA = __TRAIN_DATA__;
  </script>
  <script>

    const CATEGORY_STYLES = {
      ambiguous:     'bg-amber-50 text-amber-700 border-amber-200',
      missing:       'bg-blue-50 text-blue-700 border-blue-200',
      incorrect:     'bg-red-50 text-red-700 border-red-200',
      environmental: 'bg-violet-50 text-violet-700 border-violet-200',
      edge_case:     'bg-slate-100 text-slate-600 border-slate-200',
      // Legacy categories (backward compat)
      instruction_gap:       'bg-blue-50 text-blue-700 border-blue-200',
      instruction_ambiguity: 'bg-amber-50 text-amber-700 border-amber-200',
      wrong_assumption:      'bg-red-50 text-red-700 border-red-200',
      data_issue:            'bg-violet-50 text-violet-700 border-violet-200',
      other:                 'bg-slate-100 text-slate-600 border-slate-200',
    };

    const SEVERITY_STYLES = {
      high:   'bg-red-50 text-red-700 border-red-200',
      medium: 'bg-amber-50 text-amber-700 border-amber-200',
      low:    'bg-slate-100 text-slate-600 border-slate-200',
    };

    const STATUS_STYLES = {
      succeeded: 'bg-emerald-50 text-emerald-700 border-emerald-200',
      failed:    'bg-red-50 text-red-700 border-red-200',
    };

    function badge(text, styleMap, key) {
      const cls = styleMap[key] || 'bg-slate-50 text-slate-600 border-slate-200';
      return `<span class="inline-block text-xs font-medium px-2 py-0.5 rounded border ${cls}">${esc(text)}</span>`;
    }

    function esc(text) {
      const d = document.createElement('div');
      d.textContent = text || '';
      return d.innerHTML;
    }

    function fmtContent(text) {
      let s = esc(text);
      s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
      s = s.replace(/`(.+?)`/g, '<code class="bg-slate-100 px-1 py-0.5 rounded text-xs">$1</code>');
      return s;
    }

    function thCell(text, w) {
      const style = w ? ` style="width:${w}"` : '';
      return `<th class="bg-slate-50 border border-slate-200 px-3 py-2 text-left text-xs font-semibold text-slate-600 uppercase tracking-wide"${style}>${esc(text)}</th>`;
    }

    function tdCell(html, cls) {
      return `<td class="border border-slate-200 px-3 py-2 align-top text-sm ${cls || ''}">${html}</td>`;
    }

    function renderFrictionTable(friction) {
      if (!friction || friction.length === 0) {
        return '<p class="text-sm text-slate-400 italic">No friction recorded.</p>';
      }

      // Detect schema: executor (has 'item' + 'friction' fields) vs schemas (has 'description' + 'affected_items')
      const hasExecutorSchema = friction.some(f => f.item !== undefined);

      let h = '<table class="min-w-full text-sm border-collapse"><thead><tr>';
      h += thCell('#', '40px');
      h += thCell('Category', '120px');
      if (friction.some(f => f.severity)) h += thCell('Severity', '90px');
      if (hasExecutorSchema) h += thCell('Item', '140px');
      h += thCell('Description');
      h += thCell('Workaround');
      if (friction.some(f => f.affected_items)) h += thCell('Affected', '80px');
      h += '</tr></thead><tbody>';

      friction.forEach((f, i) => {
        h += '<tr>';
        h += tdCell(`<span class="mono text-xs text-slate-500">${esc(String(f.id || (i + 1)))}</span>`);
        h += tdCell(badge(f.category || 'unknown', CATEGORY_STYLES, f.category));
        if (f.severity !== undefined || friction.some(x => x.severity)) {
          h += f.severity ? tdCell(badge(f.severity, SEVERITY_STYLES, f.severity)) : tdCell('');
        }
        if (hasExecutorSchema) {
          h += f.item ? tdCell(`<span class="text-xs text-slate-600">${esc(f.item)}</span>`) : tdCell('');
        }
        const desc = f.description || f.friction || '';
        h += tdCell(fmtContent(desc));
        h += tdCell(f.workaround ? fmtContent(f.workaround) : '<span class="text-slate-300 italic">—</span>');
        if (friction.some(x => x.affected_items)) {
          h += f.affected_items ? tdCell(`<span class="mono text-xs text-slate-500">${f.affected_items.join(', ')}</span>`) : tdCell('');
        }
        h += '</tr>';
      });

      h += '</tbody></table>';

      // Category breakdown
      const catCounts = {};
      friction.forEach(f => { catCounts[f.category || 'unknown'] = (catCounts[f.category || 'unknown'] || 0) + 1; });
      h += '<div class="flex gap-3 mt-3 pt-3 border-t border-slate-100">';
      Object.entries(catCounts).forEach(([cat, count]) => {
        h += `<div class="flex items-center gap-1.5">${badge(cat, CATEGORY_STYLES, cat)}<span class="mono text-xs text-slate-400">${count}</span></div>`;
      });
      h += '</div>';

      return h;
    }

    function renderResultsTable(results) {
      if (!results || results.length === 0) {
        return '<p class="text-sm text-slate-400 italic">No item results recorded.</p>';
      }

      const hasFailure = results.some(r => r.failure_reason);

      let h = '<table class="min-w-full text-sm border-collapse"><thead><tr>';
      h += thCell('#', '40px') + thCell('Item') + thCell('Status', '100px');
      if (hasFailure) h += thCell('Failure Reason');
      h += '</tr></thead><tbody>';

      results.forEach((r, i) => {
        h += '<tr>';
        h += tdCell(`<span class="mono text-xs text-slate-500">${i + 1}</span>`);
        h += tdCell(`<code class="bg-slate-100 px-1.5 py-0.5 rounded text-xs">${esc(r.name)}</code>`);
        h += tdCell(badge(r.status, STATUS_STYLES, r.status));
        if (hasFailure) {
          h += r.failure_reason ? tdCell(fmtContent(r.failure_reason)) : tdCell('');
        }
        h += '</tr>';
      });

      h += '</tbody></table>';

      // Pass rate summary
      const passed = results.filter(r => r.status === 'succeeded').length;
      const total = results.length;
      const pct = total > 0 ? Math.round((passed / total) * 100) : 0;
      h += `<div class="flex items-center gap-3 mt-3 pt-3 border-t border-slate-100">`;
      h += `<span class="mono text-sm font-medium ${pct === 100 ? 'text-emerald-600' : 'text-slate-700'}">${passed}/${total} passed (${pct}%)</span>`;
      h += `<div class="flex-1 bg-slate-100 rounded-full h-1.5 max-w-48"><div class="${pct === 100 ? 'bg-emerald-500' : pct >= 60 ? 'bg-blue-500' : 'bg-red-500'} h-1.5 rounded-full" style="width:${pct}%"></div></div>`;
      h += '</div>';

      return h;
    }

    function renderScriptsTable(scripts) {
      if (!scripts || scripts.length === 0) return '';

      // Handle both array-of-strings and array-of-objects formats
      let h = '<div class="space-y-2">';
      scripts.forEach(s => {
        if (typeof s === 'string') {
          h += `<div class="flex items-center gap-3 text-sm"><code class="bg-slate-100 px-2 py-0.5 rounded text-xs text-slate-700">${esc(s)}</code></div>`;
        } else {
          h += `<div class="flex items-center gap-3 text-sm"><code class="bg-slate-100 px-2 py-0.5 rounded text-xs text-slate-700">${esc(s.name)}</code>`;
          if (s.purpose) h += `<span class="text-xs text-slate-500">${esc(s.purpose)}</span>`;
          h += '</div>';
        }
      });
      h += '</div>';
      return h;
    }

    function render() {
      const data = typeof TRAIN_DATA !== 'undefined' ? TRAIN_DATA : null;
      if (!data) {
        document.getElementById('header-meta').textContent = 'No data embedded.';
        return;
      }

      const iteration = data.iteration || 'unknown';
      document.title = `Train: ${iteration}`;
      document.getElementById('header-title').textContent = `Train: ${iteration}`;
      document.getElementById('header-meta').textContent = data.generated_at
        ? `Generated: ${data.generated_at}` : '';

      // Header stats
      const friction = data.friction || [];
      const summary = data.summary || {};
      const results = summary.item_results || [];
      const scripts = summary.scripts_created || [];
      const passed = results.filter(r => r.status === 'succeeded').length;
      const total = results.length;

      let statsHtml = '';
      statsHtml += `<div class="text-center"><span class="mono font-bold text-white block">${friction.length}</span><span class="text-[10px] text-slate-400 uppercase">friction</span></div>`;
      if (total > 0) {
        statsHtml += `<div class="text-center"><span class="mono font-bold text-white block">${passed}/${total}</span><span class="text-[10px] text-slate-400 uppercase">passed</span></div>`;
      }
      if (scripts.length > 0) {
        statsHtml += `<div class="text-center"><span class="mono font-bold text-white block">${scripts.length}</span><span class="text-[10px] text-slate-400 uppercase">scripts</span></div>`;
      }
      document.getElementById('header-stats').innerHTML = statsHtml;

      // Friction
      document.getElementById('friction-container').innerHTML = renderFrictionTable(friction);

      // Item results
      document.getElementById('results-container').innerHTML = renderResultsTable(results);

      // Scripts
      if (scripts.length > 0) {
        document.getElementById('section-scripts').classList.remove('hidden');
        document.getElementById('scripts-container').innerHTML = renderScriptsTable(scripts);
      }

      // Notes
      if (summary.notes) {
        document.getElementById('section-notes').classList.remove('hidden');
        document.getElementById('notes-container').innerHTML =
          `<p class="text-sm leading-relaxed text-slate-700">${fmtContent(summary.notes)}</p>`;
      }
    }

    render();
  </script>
</body>
</html>
